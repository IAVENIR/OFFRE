/* ========== RENDER HELPERS ========== */
function moduleCard(m, colorScheme) {
  const isScience = colorScheme === 'science';
  const gradFrom = isScience ? 'from-teal-500' : 'from-iavenir-400';
  const gradTo = isScience ? 'to-teal-700' : 'to-iavenir-600';
  const iconBg = isScience ? 'bg-teal-100' : 'bg-iavenir-100';
  const iconClr = isScience ? 'text-teal-600' : 'text-iavenir-600';
  const checkClr = isScience ? 'text-teal-500' : 'text-iavenir-500';
  const dureeBg = isScience ? 'bg-teal-50 border-teal-200 text-teal-700' : 'bg-iavenir-50 border-iavenir-200 text-iavenir-700';
  const highlight = m.highlight ? (isScience ? 'border-teal-300 shadow-md' : 'border-iavenir-300 shadow-md') : 'border-gray-200';
 
  return `
    <div class="bg-white rounded-2xl border ${highlight} overflow-hidden hover:shadow-md transition-shadow">
      <div class="flex items-stretch">
        <div class="w-2 bg-gradient-to-b ${gradFrom} ${gradTo} flex-shrink-0"></div>
        <div class="flex-1 p-5">
          <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 ${iconBg} rounded-xl flex items-center justify-center ${iconClr}">${ic[m.icon]}</div>
              <div>
                <div class="text-xs text-gray-400 font-semibold uppercase">Module ${m.num}</div>
                <div class="font-bold text-gray-900">${m.title}</div>
              </div>
            </div>
            <div class="${dureeBg} border px-3 py-1 rounded-full text-xs font-bold">${m.duree}</div>
          </div>
          <div class="grid md:grid-cols-2 gap-2">
            ${m.items.map(item => `
              <div class="flex items-start gap-2">
                <span class="${checkClr} flex-shrink-0 mt-0.5">${ic.check}</span>
                <span class="text-sm text-gray-600">${item}</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>`;
}
 
function periodBlock(block, colorScheme) {
  const isMatin = block.period === 'matin';
  const isScience = colorScheme === 'science';
  const pillBg = isMatin
    ? (isScience ? 'bg-teal-50 text-teal-700 border-teal-200' : 'bg-amber-50 text-amber-700 border-amber-200')
    : (isScience ? 'bg-teal-50 text-teal-600 border-teal-200' : 'bg-indigo-50 text-indigo-700 border-indigo-200');
  const periodIcon = isMatin ? ic.sun : ic.moon;
 
  return `
    <div class="mb-6">
      <div class="flex items-center gap-3 mb-3">
        <div class="${pillBg} border rounded-full px-4 py-1.5 text-sm font-bold flex items-center gap-2">
          ${periodIcon} ${block.label}
        </div>
        <div class="h-px flex-1 bg-gray-200"></div>
      </div>
      <div class="space-y-3 ml-2">
        ${block.modules.map(m => moduleCard(m, colorScheme)).join('')}
      </div>
    </div>`;
}

        <div class="animate-bounce text-iavenir-300">${ic.down}</div>
      </div>
    </section>
 
    <!-- FORMAT SELECTOR + PROGRAMME -->
    <section id="programme" class="py-16 bg-white">
      <div class="max-w-6xl mx-auto px-6">
        <div class="text-center mb-10">
          <h2 class="text-3xl font-bold text-gray-900 mb-3">Programme de formation</h2>
          <p class="text-gray-500 max-w-xl mx-auto mb-8">Deux formats selon la profondeur visée et le temps disponible</p>
          <div class="inline-flex bg-gray-100 rounded-full p-1 gap-1">
            <button onclick="setFormat('1jour')" class="px-6 py-2.5 rounded-full text-sm font-semibold transition-all ${is1j ? 'bg-iavenir-500 text-white shadow' : 'text-gray-500 hover:text-gray-800'}">1 Jour · 7h</button>
            <button onclick="setFormat('2jours')" class="px-6 py-2.5 rounded-full text-sm font-semibold transition-all ${is2j ? 'bg-iavenir-500 text-white shadow' : 'text-gray-500 hover:text-gray-800'}">2 Jours · 14h</button>
          </div>
        </div>
 
        <!-- PRIX & RÉSUMÉ -->
        <div class="fade-in max-w-4xl mx-auto mb-10">
          <div class="bg-white rounded-3xl border-2 border-iavenir-300 shadow-xl overflow-hidden">
            <div class="bg-gradient-to-r from-iavenir-500 to-iavenir-700 p-8 text-white">
              <div class="flex items-start justify-between flex-wrap gap-4">
                <div class="flex items-center gap-4">
                  <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center text-white">${ic.grad}</div>
                  <div>
                    <div class="text-iavenir-100 text-xs uppercase tracking-wider font-bold mb-1">${d.title}</div>
                    <h3 class="text-2xl font-bold">IA générative pour tous publics Inserm</h3>
                    <p class="text-iavenir-200">${d.subtitle} · Présentiel ou distanciel</p>
                  </div>
                </div>
                <div class="text-right">
                  <div class="text-3xl font-bold">${d.prix}</div>
                  <div class="text-iavenir-200 text-sm">HT / session</div>
                </div>
              </div>
            </div>
            <div class="p-6 bg-iavenir-50/50">
              <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                ${[
                  ['Public cible', 'Administratifs, techniques, chercheurs, managers'],
                  ['Prérequis', 'Aucun — tous niveaux'],
                  ['Horaires', '9h00 — 12h30 / 13h30 — 17h00'],
                  ['Livrables', 'Support + boîte à outils de prompts']
                ].map(([label, val]) => `
                  <div class="bg-white rounded-xl p-3 border border-iavenir-100">
                    <div class="text-xs text-iavenir-600 font-bold mb-1">${label}</div>
                    <div class="text-sm text-gray-700">${val}</div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
 
        <!-- DÉROULEMENT -->
        <div class="fade-in max-w-4xl mx-auto">
          ${is1j ? render1jour() : render2jours()}
        </div>
      </div>
    </section>
 
    <!-- PÉDAGOGIE -->
    <section id="pedagogie" class="py-16 bg-gray-50">
      <div class="max-w-6xl mx-auto px-6">
        <div class="text-center mb-10">
          <h2 class="text-3xl font-bold text-gray-900 mb-2">Approche pédagogique</h2>
          <p class="text-gray-500">Une formation pensée pour les publics hétérogènes</p>
        </div>
 
        <div class="grid md:grid-cols-3 gap-6 max-w-4xl mx-auto mb-10">
          ${[
            [ic.play, 'iavenir', '80% pratique', 'Ateliers sur des cas réels : courriers, synthèses, résumés, rédaction. Chaque participant repart avec des usages concrets.'],
            [ic.tool, 'iavenir', 'Accessible à tous', 'Aucun prérequis technique. Un langage simple, adaptable autant à un administratif qu\u2019à un chercheur ou un manager.'],
            [ic.flask, 'science', 'Aligné Inserm', 'Cohérent avec le Guide de bonnes pratiques IA Inserm (février 2025) et les enjeux d\u2019intégrité scientifique.']
          ].map(([icon, color, title, desc]) => {
            const isS = color === 'science';
            return `
            <div class="bg-white rounded-2xl p-6 border border-gray-200 shadow-sm hover:shadow-md transition-shadow">
              <div class="w-12 h-12 ${isS ? 'bg-teal-100' : 'bg-iavenir-100'} rounded-2xl flex items-center justify-center ${isS ? 'text-teal-600' : 'text-iavenir-600'} mb-4">${icon}</div>
              <h3 class="font-bold text-gray-900 mb-2">${title}</h3>
              <p class="text-sm text-gray-500 leading-relaxed">${desc}</p>
            </div>`;
          }).join('')}
        </div>
 
        <!-- AVANT / APRÈS -->
        <div class="grid md:grid-cols-2 gap-6 max-w-4xl mx-auto">
          <div class="bg-white rounded-2xl border-2 border-gray-200 p-6">
            <div class="inline-block mb-3 px-3 py-1 bg-gray-200 rounded-full text-gray-600 text-xs font-bold uppercase tracking-wider">Avant la formation</div>
            <div class="space-y-3">
              ${[
                'Usages IA individuels, inégaux selon les profils',
                'Crainte face à la technologie ou à l\u2019intégrité scientifique',
                'Difficulté à synthétiser de longs documents',
                'Outils mal connus ou mal utilisés'
              ].map(t => `<div class="flex items-center gap-2 text-sm text-gray-500"><span class="text-gray-300">${ic.alert}</span>${t}</div>`).join('')}
            </div>
          </div>
          <div class="bg-iavenir-500 rounded-2xl shadow-xl p-6 text-white">
            <div class="inline-block mb-3 px-3 py-1 bg-white/20 rounded-full text-white text-xs font-bold uppercase tracking-wider">Après la formation</div>
            <div class="space-y-3">
              ${[
                'Équipes autonomes et à l\u2019aise avec les outils IA',
                'Du temps dégagé sur les tâches rédactionnelles chronophages',
                'Usages sécurisés, alignés avec le cadre Inserm',
                'Culture IA partagée au sein des unités et des services'
              ].map(t => `<div class="flex items-center gap-2 text-sm text-iavenir-100"><span class="text-white">${ic.check}</span>${t}</div>`).join('')}
            </div>
          </div>
        </div>
      </div>
    </section>
 
    <!-- QUALIOPI & OPCO -->
    <section id="certification" class="py-16 bg-iavenir-50">
      <div class="max-w-5xl mx-auto px-6">
        <div class="text-center mb-10">
          <h2 class="text-3xl font-bold text-gray-900 mb-2">Certification & Financement</h2>
          <p class="text-gray-500">Une formation certifiée, finançable par votre OPCO</p>
        </div>
        <div class="grid md:grid-cols-2 gap-6 max-w-4xl mx-auto">
          <!-- QUALIOPI -->
          <div class="bg-white rounded-2xl border-2 border-iavenir-300 shadow-lg p-6">
            <div class="flex items-center gap-4 mb-4">
              <div class="w-14 h-14 bg-iavenir-100 rounded-2xl flex items-center justify-center text-iavenir-600">${ic.award}</div>
              <div>
                <h3 class="text-xl font-bold text-gray-900">Certifié Qualiopi</h3>
                <p class="text-sm text-gray-500">Actions de formation</p>
              </div>
            </div>
            <p class="text-sm text-gray-600 mb-4">IAvenir est un organisme de formation certifié Qualiopi au titre de la catégorie « Actions de formation ». Cette certification atteste de la qualité du processus mis en œuvre et est un gage de sérieux pour l'Inserm comme pour vos agents.</p>
            <div class="space-y-2">
              ${[
                'Processus qualité audité et certifié',
                'Programmes conformes aux exigences du référentiel national',
                'Suivi et évaluation des acquis systématiques',
                'Attestation de fin de formation délivrée'
              ].map(t => '<div class="flex items-start gap-2"><span class="text-iavenir-500 flex-shrink-0 mt-0.5">' + ic.check + '</span><span class="text-sm text-gray-700">' + t + '</span></div>').join('')}
            </div>
          </div>
          <!-- OPCO -->
          <div class="bg-white rounded-2xl border-2 border-teal-300 shadow-lg p-6">
            <div class="flex items-center gap-4 mb-4">
              <div class="w-14 h-14 bg-teal-100 rounded-2xl flex items-center justify-center text-teal-600">${ic.bar}</div>
              <div>
                <h3 class="text-xl font-bold text-gray-900">Finançable OPCO</h3>
                <p class="text-sm text-gray-500">Prise en charge possible jusqu'à 100%</p>
              </div>
            </div>
            <p class="text-sm text-gray-600 mb-4">Grâce à notre certification Qualiopi, cette formation est éligible à une prise en charge par votre OPCO. Nous vous accompagnons dans le montage du dossier de financement.</p>
            <div class="space-y-2">
              ${[
                'Éligible à tous les OPCO',
                'Prise en charge partielle ou totale selon votre branche',
                'Aide au montage du dossier de financement',
                'Convention de formation et programme détaillé fournis'
              ].map(t => '<div class="flex items-start gap-2"><span class="text-teal-500 flex-shrink-0 mt-0.5">' + ic.check + '</span><span class="text-sm text-gray-700">' + t + '</span></div>').join('')}
            </div>
            <div class="mt-4 bg-teal-50 border border-teal-200 rounded-xl p-3 text-center">
              <div class="text-sm text-teal-800 font-semibold">Investissement net potentiel pour l'Inserm</div>
              <div class="text-2xl font-bold text-teal-700 mt-1">0 &euro; à ${d.prix}</div>
              <div class="text-xs text-teal-600 mt-1">selon le niveau de prise en charge de votre OPCO</div>
            </div>
          </div>
        </div>
      </div>
    </section>
 
    <!-- ACTION -->
    <section id="action" class="py-16 bg-gray-900">
      <div class="max-w-7xl mx-auto px-6">
        <div class="text-center mb-10">
          <h2 class="text-4xl font-bold text-white mb-2">Prêt à passer à l'action ?</h2>
          <p class="text-gray-400">Voici les prochaines étapes pour l'Inserm</p>
        </div>
        <div class="grid md:grid-cols-3 gap-6">
          <div class="bg-gray-800 rounded-2xl p-6 border border-gray-700">
            <h3 class="text-white font-bold mb-5 flex items-center gap-2">${ic.clock} Prochaines étapes</h3>
            <div class="space-y-4">
              ${[
                ['bg-iavenir-500', 'Qualification des besoins (ce RDV)'],
                ['bg-iavenir-600', 'Envoi du devis adapté'],
                ['bg-iavenir-700', 'Planification des sessions'],
                ['bg-teal-500', 'Formation(s) et suivi post-formation']
              ].map(([bg, lbl]) => `
                <div class="flex items-center gap-3">
                  <div class="w-3 h-3 ${bg} rounded-full flex-shrink-0"></div>
                  <span class="text-gray-300 text-sm">${lbl}</span>
                </div>
              `).join('')}
            </div>
          </div>
          <div class="bg-gray-800 rounded-2xl p-6 border border-gray-700">
            <h3 class="text-white font-bold mb-5 flex items-center gap-2">${ic.bar} Récapitulatif</h3>
            <div class="space-y-3 mb-4">
              <div class="flex justify-between"><span class="text-gray-400 text-sm">Format</span><span class="text-white font-bold">${is1j ? '1 jour (7h)' : '2 jours (2 × 7h)'}</span></div>
              <div class="flex justify-between"><span class="text-gray-400 text-sm">Modalité</span><span class="text-white font-bold">Présentiel / Distanciel</span></div>
              <div class="flex justify-between"><span class="text-gray-400 text-sm">Participants</span><span class="text-white font-bold">12 max / session</span></div>
              <div class="flex justify-between"><span class="text-gray-400 text-sm">Horaires</span><span class="text-white font-bold">9h — 17h</span></div>
            </div>
            <div class="border-t border-gray-700 pt-3 flex justify-between items-center">
              <span class="text-gray-300 font-bold">Investissement</span>
              <span class="text-2xl font-bold text-iavenir-400">${d.prix} HT</span>
            </div>
            <div class="mt-3 text-xs text-teal-400 flex items-center gap-1">${ic.check} Financement OPCO possible</div>
          </div>
          <div class="bg-gray-800 rounded-2xl p-6 border border-gray-700">
            <h3 class="text-white font-bold mb-5">Votre contact</h3>
            <div class="flex items-center gap-3 mb-5">
              <div class="w-12 h-12 bg-iavenir-500 rounded-full flex items-center justify-center text-white font-bold text-lg">ML</div>
              <div>
                <div class="text-white font-bold">Mathieu Legeas</div>
                <div class="text-gray-400 text-xs">Cofondateur · Expert IA</div>
              </div>
            </div>
            <div class="space-y-2">
              <div class="bg-gray-700 rounded-xl p-3 flex items-center gap-3">${ic.phone}<span class="text-gray-300 text-sm">07 61 60 22 77</span></div>
              <div class="bg-gray-700 rounded-xl p-3 flex items-center gap-3">${ic.mail}<span class="text-gray-300 text-sm">mathieu.legeas@iavenir-formation.fr</span></div>
              <div class="bg-iavenir-900/50 border border-iavenir-700 rounded-xl p-3 flex items-center gap-3">${ic.award}<span class="text-iavenir-300 text-sm font-semibold">Certifié Qualiopi</span></div>
            </div>
          </div>
        </div>
      </div>
    </section>
 
    <footer class="bg-gray-950 text-gray-500 py-6 text-center text-sm">
      <div class="text-iavenir-400 font-bold text-lg mb-1">IAvenir &times; Inserm</div>
      Formation & Conseil en Intelligence Artificielle · Qualiopi
    </footer>
  `;
}
 
/* ========== 1 JOUR RENDER ========== */
function render1jour() {
  return `
    ${periodBlock(data1jour.blocks[0], 'iavenir')}
    ${pauseIndicator()}
    ${periodBlock(data1jour.blocks[1], 'iavenir')}
  `;
}
 
/* ========== 2 JOURS RENDER ========== */
function render2jours() {
  return data2jours.jours.map(jour => {
    const isScience = jour.color === 'science';
    const headerBg = isScience ? 'bg-teal-100 text-teal-800 border-teal-300' : 'bg-iavenir-100 text-iavenir-800 border-iavenir-300';
    const lineBg = isScience ? 'bg-teal-200' : 'bg-iavenir-200';
 
    return `
      <div class="mb-8">
        <div class="flex items-center gap-3 mb-5">
          <div class="h-0.5 flex-1 ${lineBg}"></div>
          <div class="${headerBg} border px-5 py-2 rounded-full text-sm font-bold">${jour.label} · 7h</div>
          <div class="h-0.5 flex-1 ${lineBg}"></div>
        </div>
        ${periodBlock(jour.blocks[0], jour.color)}
        ${pauseIndicator()}
        ${periodBlock(jour.blocks[1], jour.color)}
      </div>
    `;
  }).join('');
}
 
function setFormat(f) { state.format = f; render(); document.getElementById('programme')?.scrollIntoView({behavior:'smooth'}); }
window.setFormat = setFormat;
 
render();
</script>
</body>
</html>
