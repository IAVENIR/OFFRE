/* ========== RENDER HELPERS ========== */
function moduleCard(m, colorScheme) {
  const isDeep = colorScheme === 'deep';
  const gradFrom = isDeep ? 'from-blue-400' : 'from-iavenir-400';
  const gradTo   = isDeep ? 'to-blue-700'   : 'to-iavenir-600';
  const iconBg   = isDeep ? 'bg-blue-100'   : 'bg-iavenir-100';
  const iconClr  = isDeep ? 'text-blue-600' : 'text-iavenir-600';
  const checkClr = isDeep ? 'text-blue-500' : 'text-iavenir-500';
  const dureeBg  = isDeep ? 'bg-blue-50 border-blue-200 text-blue-700' : 'bg-iavenir-50 border-iavenir-200 text-iavenir-700';
  const highlight = m.highlight ? (isDeep ? 'border-blue-300 shadow-md' : 'border-iavenir-300 shadow-md') : 'border-gray-200';
 
  return `
    <div class="bg-white rounded-2xl border ${highlight} overflow-hidden hover:shadow-md transition-shadow">
      <div class="flex items-stretch">
        <div class="w-2 bg-gradient-to-b ${gradFrom} ${gradTo} flex-shrink-0"></div>
        <div class="flex-1 p-5">
          <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 ${iconBg} rounded-xl flex items-center justify-center ${iconClr}">${ic[m.icon]}</div>
              <div>
                <div class="text-xs text-gray-400 font-semibold uppercase">Module ${m.num}</div>
                <div class="font-bold text-gray-900">${m.title}</div>
              </div>
            </div>
            <div class="${dureeBg} border px-3 py-1 rounded-full text-xs font-bold">${m.duree}</div>
          </div>
          <div class="grid md:grid-cols-2 gap-2">
            ${m.items.map(item => `
              <div class="flex items-start gap-2">
                <span class="${checkClr} flex-shrink-0 mt-0.5">${ic.check}</span>
                <span class="text-sm text-gray-600">${item}</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>`;
}
 
function periodBlock(block, colorScheme) {
  const isMatin = block.period === 'matin';
  const isDeep = colorScheme === 'deep';
  const pillBg = isMatin
    ? (isDeep ? 'bg-amber-50 text-amber-700 border-amber-200' : 'bg-amber-50 text-amber-700 border-amber-200')
    : (isDeep ? 'bg-blue-50 text-blue-700 border-blue-200'   : 'bg-indigo-50 text-indigo-700 border-indigo-200');
  const periodIcon = isMatin ? ic.sun : ic.moon;
 
  return `
    <div class="mb-6">
      <div class="flex items-center gap-3 mb-3">
        <div class="${pillBg} border rounded-full px-4 py-1.5 text-sm font-bold flex items-center gap-2">
          ${periodIcon} ${block.label}
        </div>
        <div class="h-px flex-1 bg-gray-200"></div>
      </div>
      <div class="space-y-3 ml-2">
        ${block.modules.map(m => moduleCard(m, colorScheme)).join('')}
      </div>
    </div>`;
}

/* ========== 1 JOUR ========== */
function render1jour() {
  return `
    ${periodBlock(data1jour.blocks[0], 'iavenir')}
    ${pauseIndicator()}
    ${periodBlock(data1jour.blocks[1], 'iavenir')}
  `;
}
 
/* ========== 2 JOURS ========== */
function render2jours() {
  return data2jours.jours.map(jour => {
    const isDeep = jour.color === 'deep';
    const headerBg = isDeep ? 'bg-blue-100 text-blue-800 border-blue-300' : 'bg-iavenir-100 text-iavenir-800 border-iavenir-300';
    const lineBg   = isDeep ? 'bg-blue-200' : 'bg-iavenir-200';
 
    return `
      <div class="mb-8">
        <div class="flex items-center gap-3 mb-5">
          <div class="h-0.5 flex-1 ${lineBg}"></div>
          <div class="${headerBg} border px-5 py-2 rounded-full text-sm font-bold">${jour.label} · 7h</div>
          <div class="h-0.5 flex-1 ${lineBg}"></div>
        </div>
        ${periodBlock(jour.blocks[0], jour.color)}
        ${pauseIndicator()}
        ${periodBlock(jour.blocks[1], jour.color)}
      </div>
    `;
  }).join('');
}
 
function setFormat(f) { state.format = f; render(); document.getElementById('programme')?.scrollIntoView({behavior:'smooth'}); }
window.setFormat = setFormat;
 
render();
</script>
